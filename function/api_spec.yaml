openapi: 3.0.1
info:
  title: WAFW00F API
  version: 1.0.0
  description: API for detecting WAF solutions using wafw00f.
servers:
  - url: https://wafw00f.kscsc.online/api
paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK
  /openapi:
    get:
      summary: Get OpenAPI specification in YAML format
      responses:
        '200':
          description: OpenAPI YAML specification
          content:
            application/yaml:
              schema:
                type: string
  /trigger_waf_woof:
    post:
      summary: Detect WAF, validate TLS and security headers for a target URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target:
                  type: string
                  description: Target URL to scan (must start with http:// or https://)
              required:
                - target
      responses:
        '200':
          description: WAF detection, TLS validation and security header analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  target:
                    type: string
                    example: https://contact.kscsc.online
                  status:
                    type: string
                    example: protected
                  solution:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: string
                    example: ["Cloudflare (Cloudflare Inc.)"]
                  tls:
                    type: object
                    description: TLS configuration analysis with scoring
                    properties:
                      version:
                        type: string
                        example: TLSv1.3
                      cipher:
                        type: string
                        example: TLS_AES_256_GCM_SHA384
                      key_bits:
                        type: integer
                        example: 256
                      score:
                        type: integer
                        description: Weighted score 0-100
                        example: 95
                      grade:
                        type: string
                        enum: [A, B, C, D, F]
                        example: A
                      issues:
                        type: array
                        items:
                          type: string
                  security_headers:
                    type: object
                    description: Security header validation per OWASP ASVS
                    properties:
                      score:
                        type: integer
                        description: Overall header score 0-100
                        example: 75
                      grade:
                        type: string
                        enum: [A, B, C, D, F]
                        example: B
                      headers:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            present:
                              type: boolean
                            value:
                              type: string
                              nullable: true
                            description:
                              type: string
                            status:
                              type: string
                              enum: [pass, warn, missing, optional-missing]
                            issues:
                              type: array
                              items:
                                type: string
                      issues:
                        type: array
                        items:
                          type: string
                      info_leakage:
                        type: array
                        items:
                          type: object
                          properties:
                            header:
                              type: string
                            value:
                              type: string
                            recommendation:
                              type: string
        '400':
          description: Bad request (invalid input)
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string